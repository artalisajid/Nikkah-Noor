name: Expo OTA Update

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Write production env
        run: |
          cat <<'EOF' > .env.local
          EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_REQUIRE_SUPABASE=true
          EOF

      - name: Validate env
        run: npm run env:check

      - name: Publish OTA update to production
        run: npx eas-cli@latest update --channel production --message "main:${{ github.sha }}" --environment production --non-interactive

      - name: Publish OTA update to preview
        run: npx eas-cli@latest update --channel preview --message "main:${{ github.sha }}" --environment preview --non-interactive
